name: RAi HTML Fixer Bot

on:
  push:
    branches: [main]
    paths:
      - '*.html'

jobs:
  fix-html:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Run AI Fixer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 ai-fixer.py
      
      -
name: Commit Changes
        run: |
          git config user.name "RAi-Bot"
          git config user.email "rai@candish.dev"
          git add *.html
          git commit -m "🤖 RAi: Auto-fix HTML" || echo "No changes"
          git push origin main
